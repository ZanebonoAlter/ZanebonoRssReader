services:
  backend:
    build:
      context: ./backend-go
      args:
        GOPROXY: ${GOPROXY:-}
        GOSUMDB: ${GOSUMDB:-}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    environment:
      SERVER_PORT: 5000
      SERVER_MODE: release
      DATABASE_DSN: /app/data/${SQLITE_DB_FILE:-rss_reader.db}
      CORS_ORIGINS: http://localhost:${FRONT_PORT:-3000}
    volumes:
      - ./data:/app/data
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    restart: unless-stopped

  front:
    build:
      context: ./front
      args:
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    depends_on:
      - backend
    environment:
      API_INTERNAL_BASE: http://backend:5000/api
      NUXT_PUBLIC_API_ORIGIN: http://localhost:${BACKEND_PORT:-5000}
      NUXT_PUBLIC_API_BASE: http://localhost:${BACKEND_PORT:-5000}/api
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "${FRONT_PORT:-3000}:3000"
    restart: unless-stopped
