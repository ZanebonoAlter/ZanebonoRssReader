server:
  port: "5000"
  mode: "debug"

database:
  driver: "sqlite"
  dsn: "rss_reader.db"

cors:
  origins:
    - "http://localhost:3001"
    - "http://localhost:3000"
  methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allow_headers:
    - "Content-Type"
    - "Authorization"
